<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator - AI Tools Hub</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
font-size:18px;
margin-bottom:15px;
}

button{
padding:12px 20px;
background:#2563eb;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

</head>
<body>

<div class="container">
<h1>Password Generator</h1>

<input type="text" id="password" readonly>

<button onclick="generatePassword()">Generate Password</button>

</div>

<script>
function generatePassword(){
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&!";
let password="";
for(let i=0;i<12;i++){
password+=chars.charAt(Math.floor(Math.random()*chars.length));
}
document.getElementById("password").value=password;
}
</script>

</body>
</html>
