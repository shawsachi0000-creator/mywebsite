<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>🔒 Password Strength Checker</h1>
<p>Check how strong your password is.</p>
</header>

<div class="container">
<div class="card">

<input type="password" id="password" placeholder="Enter Password">

<br><br>

<button onclick="checkPassword()">Check Strength</button>

<h2 id="result"></h2>

</div>
</div>

<script>
function checkPassword(){

let pass=document.getElementById("password").value;

let score=0;

if(pass.length>=8) score++;
if(/[A-Z]/.test(pass)) score++;
if(/[a-z]/.test(pass)) score++;
if(/[0-9]/.test(pass)) score++;
if(/[^A-Za-z0-9]/.test(pass)) score++;

let result="Weak";

if(score>=4) result="Strong";
else if(score>=2) result="Medium";

document.getElementById("result").innerHTML="Password Strength: "+result;

}
</script>

</body>
</html>
