
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

textarea{
width:100%;
height:200px;
padding:10px;
font-size:18px;
}

button{
margin-top:15px;
padding:10px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

h2{
color:#2563eb;
}
</style>

</head>
<body>

<div class="container">

<h1>Word Counter</h1>

<textarea id="text" placeholder="Type or paste text here..."></textarea>

<button onclick="countWords()">Count Words</button>

<h2 id="result">Words: 0</h2>

</div>

<script>
function countWords(){
let text=document.getElementById("text").value.trim();

if(text===""){
document.getElementById("result").innerHTML="Words: 0";
return;
}

let words=text.split(/\s+/).length;

document.getElementById("result").innerHTML="Words: "+words;
}
</script>

</body>
</html>
