<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Counter</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}
.box{
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
width:90%;
max-width:600px;
}
textarea{
width:100%;
height:180px;
padding:12px;
font-size:16px;
}
.result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="box">
<h2>🔢 Character Counter</h2>

<textarea id="text" oninput="countChar()" placeholder="Type here..."></textarea>

<div class="result" id="result">
Characters: 0
</div>

</div>

<script>
function countChar(){
let text=document.getElementById("text").value;
document.getElementById("result").innerHTML="Characters: "+text.length;
}
</script>

</body>
</html>
