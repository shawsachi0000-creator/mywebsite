<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Reverser - AI Tools Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>🔄 Text Reverser</h1>
<p>Reverse your text instantly.</p>
</header>

<div class="container">

<div class="card">

<textarea id="text" rows="8" style="width:100%;padding:15px;border-radius:10px;"></textarea>

<br><br>

<button onclick="reverseText()">Reverse Text</button>

<h2 id="result"></h2>

</div>

</div>

<script>
function reverseText(){

let text=document.getElementById("text").value;

let reversed=text.split("").reverse().join("");

document.getElementById("result").innerHTML=reversed;

}
</script>

</body>
</html>
