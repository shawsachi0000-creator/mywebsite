<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
width:90%;
max-width:420px;
text-align:center;
}

h1{
color:#2563eb;
}

input{
width:100%;
padding:12px;
font-size:16px;
margin:15px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

img{
margin-top:20px;
max-width:250px;
}
</style>

</head>

<body>

<div class="box">

<h1>📱 QR Code Generator</h1>

<input type="text" id="text" placeholder="Enter text or URL">

<button onclick="generateQR()">Generate QR Code</button>

<br><br>

<img id="qr">

</div>

<script>

function generateQR(){

let text=document.getElementById("text").value;

document.getElementById("qr").src=
"https://api.qrserver.com/v1/create-qr-code/?size=250x250&data="+encodeURIComponent(text);

}

</script>

</body>
</html>
