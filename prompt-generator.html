<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompt Generator | AI Tools Hub</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
max-width:700px;
width:90%;
text-align:center;
}

h1{
color:#2563eb;
margin-bottom:20px;
}

select,button,textarea{
width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

textarea{
height:180px;
resize:none;
}
</style>

</head>
<body>

<div class="container">

<h1>🤖 AI Prompt Generator</h1>

<select id="type">
<option value="youtube">YouTube Video</option>
<option value="blog">Blog Article</option>
<option value="instagram">Instagram Post</option>
<option value="logo">Logo Design</option>
</select>

<button onclick="generatePrompt()">Generate Prompt</button>

<textarea id="result" readonly></textarea>

<button onclick="copyPrompt()">Copy Prompt</button>

</div>

<script>

function generatePrompt(){

let type=document.getElementById("type").value;

let prompt="";

if(type==="youtube"){
prompt="Create a professional YouTube video script with SEO title, description and hashtags.";
}

if(type==="blog"){
prompt="Write a detailed SEO-friendly blog article with headings, FAQs and conclusion.";
}

if(type==="instagram"){
prompt="Create an engaging Instagram caption with trending hashtags and call to action.";
}

if(type==="logo"){
prompt="Design a modern, minimal and premium logo with a clean color palette.";
}

document.getElementById("result").value=prompt;

}

function copyPrompt(){

let text=document.getElementById("result");

text.select();

document.execCommand("copy");

alert("Prompt Copied!");

}

</script>

</body>
</html>
