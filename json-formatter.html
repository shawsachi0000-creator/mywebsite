<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter - AI Tools Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>📄 JSON Formatter</h1>
<p>Beautify and validate JSON instantly.</p>
</header>

<div class="container">

<div class="card">

<textarea id="json" rows="12" style="width:100%;padding:15px;border-radius:10px;" placeholder='{"name":"AI Tools Hub"}'></textarea>

<br><br>

<button onclick="formatJSON()">Format JSON</button>

<pre id="result"></pre>

</div>

</div>

<script>
function formatJSON(){
try{
let obj=JSON.parse(document.getElementById("json").value);
document.getElementById("result").textContent=
JSON.stringify(obj,null,2);
}catch(e){
document.getElementById("result").textContent="Invalid JSON";
}
}
</script>

</body>
</html>
