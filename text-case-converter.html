<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Case Converter - AI Tools Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>🔤 Text Case Converter</h1>
<p>Convert text to UPPERCASE, lowercase, Title Case and Sentence case.</p>
</header>

<div class="container">

<div class="card">

<textarea id="text" rows="10" style="width:100%;padding:15px;border-radius:10px;"></textarea>

<br><br>

<button onclick="upperCase()">UPPERCASE</button>
<button onclick="lowerCase()">lowercase</button>
<button onclick="titleCase()">Title Case</button>
<button onclick="copyText()">Copy</button>

</div>

</div>

<script>
function upperCase(){
document.getElementById("text").value=
document.getElementById("text").value.toUpperCase();
}

function lowerCase(){
document.getElementById("text").value=
document.getElementById("text").value.toLowerCase();
}

function titleCase(){
let text=document.getElementById("text").value.toLowerCase().split(" ");
for(let i=0;i<text.length;i++){
if(text[i]){
text[i]=text[i][0].toUpperCase()+text[i].substring(1);
}
}
document.getElementById("text").value=text.join(" ");
}

function copyText(){
let t=document.getElementById("text");
t.select();
document.execCommand("copy");
alert("Copied!");
}
</script>

</body>
</html>
